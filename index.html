      background: #020617;

</head>

<body class="text-white min-h-screen">

  </div>

  <script>

    const summaries = [

      {
        title: "Twitter Strategy",
        category: "SNS Marketing",

        sections: [

          {
            title: "認知フェーズ",
            color: "green",
            items: [
              "常識破壊",
              "尖った意見",
              "実績を見せる",
              "理想の未来を見せる"
            ]
          },

          {
            title: "フォローフェーズ",
            color: "blue",
            items: [
              "ノウハウ発信",
              "行動してる姿",
              "自己投資",
              "理念を語る"
            ]
          },

          {
            title: "ファン化",
            color: "purple",
            items: [
              "いいね",
              "リプ",
              "メルマガ",
              "商品購入"
            ]
          }

        ]
      }

    ];


    const colorMap = {
      yellow: "bg-yellow-500/10 border-yellow-400",
      green: "bg-green-500/10 border-green-400",
      red: "bg-red-500/10 border-red-400",
      blue: "bg-blue-500/10 border-blue-400",
      purple: "bg-purple-500/10 border-purple-400"
    };


    const sidebar = document.getElementById("sidebar");
    const content = document.getElementById("content");


    summaries.forEach((summary, idx) => {

      // Sidebar
      const sideCard = document.createElement("div");

      sideCard.className =
        "bg-slate-800 border border-slate-700 rounded-2xl p-4";

      sideCard.innerHTML = `
        <h2 class="text-xl font-bold">
          ${summary.title}
        </h2>

        <p class="text-slate-400 mt-2 text-sm">
          ${summary.category}
        </p>
      `;

      sidebar.appendChild(sideCard);


      // Main
      const wrapper = document.createElement("div");

      wrapper.className = "mb-16";

      wrapper.innerHTML = `
        <div class="mb-8">
          <h2 class="text-4xl font-bold mb-2">
            ${summary.title}
          </h2>

          <p class="text-slate-400 text-lg">
            カテゴリ：${summary.category}
          </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

          ${summary.sections.map(section => `

            <div class="rounded-3xl border p-6 shadow-xl ${colorMap[section.color]}">

              <h3 class="text-2xl font-bold mb-4">
                ${section.title}
              </h3>

              <ul class="space-y-3 text-base leading-relaxed">

                ${section.items.map(item => `
                  <li class="flex gap-2">
                    <span>•</span>
                    <span>${item}</span>
                  </li>
                `).join("")}

              </ul>

            </div>

          `).join("")}

        </div>
      `;

      content.appendChild(wrapper);

    });

  </script>

</body>
</html>
