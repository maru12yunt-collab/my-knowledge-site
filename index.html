<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The.X 運用</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#05070d;
}

.title {
  border: 2px solid #ff4fd8;
  padding: 10px 18px;
  border-radius: 14px;
  display:inline-block;
}

.glow {
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
}

.btn:hover {
  background: rgba(255,255,255,0.03);
}

/* ========================= */
/* 🔻 波線（修正版：赤・細め） */
/* ========================= */
.underline-wave {
  position: relative;
  display: inline-block;
}

.underline-wave::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;
  width: 100%;
  height: 2px; /* ← 細くした */
  background: #ff3b3b; /* ← 赤単色 */
  opacity: 0.9;
  border-radius: 2px;
}

/* アニメ削除（静かで見やすい） */

.block {
  margin-bottom: 14px;
}

pre {
  white-space: pre-wrap;
  line-height: 1.9;
}
</style>
</head>

<body class="text-white p-6">

<div class="max-w-5xl mx-auto">

<!-- タイトル -->
<div class="text-center mb-10">
  <div class="title text-pink-400 text-3xl font-bold">
    The.X 運用
  </div>
  <p class="text-gray-400 mt-3">Twitter運用 / アルゴリズム / ストーリー戦略</p>
</div>

<script>
function toggle(id){
  document.getElementById(id).classList.toggle("hidden");
}
</script>

<!-- ===================== -->
<!-- 第4章 -->
<!-- ===================== -->
<div class="glow mb-6">

<button class="btn w-full text-left p-5 flex justify-between" onclick="toggle('ch4')">
<span class="text-pink-300 font-bold">第4章：運用の本質（導線設計）</span>
<span>▼</span>
</button>

<div id="ch4" class="hidden p-6 text-gray-200">

<div class="block">
この章の要点は、
<span class="underline-wave">Twitter運用＝フォロワー数ではなく“人を行動させて商品を買ってもらう導線作り”</span>
</div>

<div class="block">
興味 → 信頼 → 行動 → 購入
</div>

<div class="block">
<span class="underline-wave">背中で語る</span>
</div>

</div>
</div>

<!-- ===================== -->
<!-- 第5章 -->
<!-- ===================== -->
<div class="glow mb-6">

<button class="btn w-full text-left p-5 flex justify-between" onclick="toggle('ch5')">
<span class="text-cyan-300 font-bold">第5章：アルゴリズム戦略</span>
<span>▼</span>
</button>

<div id="ch5" class="hidden p-6 text-gray-200">

<div class="block">
<span class="underline-wave">Twitter社が儲かる運用を増やすために設計されている</span>
</div>

<div class="block">
滞在時間が最重要
</div>

<div class="block">
結論：
<span class="underline-wave">滞在時間が全て</span>
</div>

</div>
</div>

<!-- ===================== -->
<!-- 第6章 -->
<!-- ===================== -->
<div class="glow mb-6">

<button class="btn w-full text-left p-5 flex justify-between" onclick="toggle('ch6')">
<span class="text-yellow-300 font-bold">第6章：感情とファン化</span>
<span>▼</span>
</button>

<div id="ch6" class="hidden p-6 text-gray-200">

<div class="block">
人は
<span class="underline-wave">情報ではなく“感情が動いた人”に惹かれる</span>
</div>

<div class="block">
ノウハウはコピーされるが
<span class="underline-wave">キャラはコピーされない</span>
</div>

</div>
</div>

<!-- ===================== -->
<!-- 第7章 -->
<!-- ===================== -->
<div class="glow mb-6">

<button class="btn w-full text-left p-5 flex justify-between" onclick="toggle('ch7')">
<span class="text-indigo-300 font-bold">第7章：長文テンプレ</span>
<span>▼</span>
</button>

<div id="ch7" class="hidden p-6 text-gray-200">

<div class="block">
ストーリーは
<span class="underline-wave">感情設計</span>
</div>

<div class="block">
キャッチ → 導入 → 事件 → 感情 → 教訓 → 行動 → 締め
</div>

</div>
</div>

</div>
</body>
</html>
