<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- サイト名（タブ表示） -->
  <title>The.X 運用</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen p-8">

  <main class="max-w-5xl mx-auto space-y-6">

    <!-- ===================== -->
    <!-- タイトル -->
    <!-- ===================== -->
    <div class="text-center mb-10">

      <h1 class="text-4xl md:text-5xl font-bold mb-2">
        The<span class="text-cyan-400">.X</span> 運用
      </h1>

      <p class="text-slate-400">
        Twitter運用・ストーリー・アルゴリズム戦略まとめ
      </p>

    </div>

    <!-- ===================== -->
    <!-- アコーディオン関数 -->
    <!-- ===================== -->
    <script>
      function toggleSection(id) {
        const el = document.getElementById(id);
        el.classList.toggle("hidden");
      }
    </script>

    <!-- ================================================= -->
    <!-- 第4章（追加済み：運用の本質） -->
    <!-- ================================================= -->
    <div class="bg-slate-900 rounded-2xl border border-yellow-400 overflow-hidden">

      <button onclick="toggleSection('ch4')" class="w-full text-left px-6 py-5 flex justify-between items-center hover:bg-slate-800 transition">
        <span class="text-xl font-bold text-yellow-300">
          第4章：Twitter運用の本質（導線設計）
        </span>
        <span class="text-yellow-400">▼</span>
      </button>

      <div id="ch4" class="hidden px-6 pb-6 space-y-6 text-slate-200">

        <div class="bg-slate-950 border border-yellow-400 rounded-2xl p-5">
          <h3 class="text-yellow-300 font-bold mb-2">核心</h3>
          <p>
            Twitter運用はフォロワー数ではなく、
            <span class="text-yellow-300 font-bold">人を行動させて購入につなげる設計</span>
            である。
          </p>
        </div>

        <div class="bg-slate-950 border border-cyan-400 rounded-2xl p-5">
          <h3 class="text-cyan-300 font-bold mb-3">流れ</h3>
          <div class="flex flex-wrap gap-2">
            <span class="bg-cyan-500/20 border border-cyan-400 px-3 py-1 rounded-full">興味</span>
            <span class="bg-cyan-500/20 border border-cyan-400 px-3 py-1 rounded-full">信頼</span>
            <span class="bg-cyan-500/20 border border-cyan-400 px-3 py-1 rounded-full">行動</span>
            <span class="bg-cyan-500/20 border border-cyan-400 px-3 py-1 rounded-full">購入</span>
          </div>
        </div>

      </div>
    </div>

    <!-- ================================================= -->
    <!-- 第5章（例） -->
    <!-- ================================================= -->
    <div class="bg-slate-900 rounded-2xl border border-cyan-400 overflow-hidden">

      <button onclick="toggleSection('ch5')" class="w-full text-left px-6 py-5 flex justify-between items-center hover:bg-slate-800 transition">
        <span class="text-xl font-bold text-cyan-300">
          第5章：アルゴリズム運用戦略
        </span>
        <span class="text-cyan-400">▼</span>
      </button>

      <div id="ch5" class="hidden px-6 pb-6 text-slate-200 space-y-4">

        <div class="bg-slate-950 border border-cyan-400 rounded-2xl p-5">
          <h3 class="text-cyan-300 font-bold mb-2">本質</h3>
          <p>滞在時間が最重要指標</p>
        </div>

      </div>

    </div>

  </main>

</body>
</html>
