<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>知識ライブラリ</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #020617;
    }
  </style>

</head>

<body class="text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-6">

```
<h1 class="text-5xl font-bold text-yellow-300 mb-2">
  知識ライブラリ
</h1>

<p class="text-slate-400 mb-10">
  自分専用の知識データベース
</p>

<div id="summary-container"
  class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
</div>
```

  </div>

  <script>
    const summaries = [

      {
        title: "Twitter運用戦略",
        category: "SNSマーケティング",
        color: "green",
        points: [
          "認知→ファン化→購買",
          "常識破壊で興味付け",
          "背中で語る発信",
          "小さな行動を積ませる"
        ]
      },

      {
        title: "ファン化の本質",
        category: "心理設計",
        color: "blue",
        points: [
          "知識だけでなくマインド",
          "行動している姿を見せる",
          "理念・目標を語る",
          "信頼→共感→行動"
        ]
      }

    ];

    const container = document.getElementById("summary-container");

    summaries.forEach(summary => {

      const card = document.createElement("div");

      card.className =
        `bg-${summary.color}-500/10 border border-${summary.color}-400 rounded-3xl p-6`;

      card.innerHTML = `
        <p class="text-sm text-slate-400 mb-2">
          ${summary.category}
        </p>

        <h2 class="text-2xl font-bold text-${summary.color}-300 mb-4">
          ${summary.title}
        </h2>

        <ul class="space-y-3 text-slate-200">
          ${summary.points.map(point =>
            `<li>• ${point}</li>`
          ).join("")}
        </ul>
      `;

      container.appendChild(card);
    });
  </script>

</body>
</html>
