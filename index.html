<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>知識ライブラリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen p-6">

<main class="max-w-5xl mx-auto space-y-10">

  <!-- タイトル -->
  <div class="text-center mb-10">
    <h1 class="text-4xl md:text-5xl font-bold">知識ライブラリ</h1>
    <p class="text-slate-400 mt-2">Twitter運用・ストーリー・アルゴリズム戦略</p>
  </div>

  <!-- アコーディオンJS -->
  <script>
    function toggleSection(id) {
      const el = document.getElementById(id);
      el.classList.toggle("hidden");
    }
  </script>

  <!-- ===================== -->
  <!-- 第5章 -->
  <!-- ===================== -->
  <section class="bg-slate-900 rounded-2xl border border-cyan-400 overflow-hidden">

    <button onclick="toggleSection('ch5')" class="w-full flex justify-between px-6 py-5 hover:bg-slate-800">
      <span class="text-cyan-300 font-bold text-lg">第5章：アルゴリズム戦略</span>
      <span>▼</span>
    </button>

    <div id="ch5" class="hidden px-6 pb-6 space-y-4">

      <div class="bg-slate-950 border border-cyan-400 rounded-xl p-4">
        <h3 class="text-cyan-300 font-bold mb-2">本質</h3>
        <p class="text-slate-300 text-sm">滞在時間がすべて</p>
      </div>

      <div class="bg-slate-950 border border-pink-400 rounded-xl p-4">
        <h3 class="text-pink-300 font-bold mb-2">最重要指標</h3>
        <div class="text-4xl font-bold text-pink-300">滞在時間</div>
      </div>

      <div class="flex gap-2 flex-wrap">
        <span class="px-3 py-1 rounded-full bg-cyan-500/20 border border-cyan-400">興味</span>
        <span class="px-3 py-1 rounded-full bg-cyan-500/20 border border-cyan-400">共感</span>
        <span class="px-3 py-1 rounded-full bg-cyan-500/20 border border-cyan-400">行動</span>
        <span class="px-3 py-1 rounded-full bg-cyan-500/20 border border-cyan-400">購入</span>
      </div>

    </div>
  </section>

  <!-- ===================== -->
  <!-- 第6章 -->
  <!-- ===================== -->
  <section class="bg-slate-900 rounded-2xl border border-yellow-400 overflow-hidden">

    <button onclick="toggleSection('ch6')" class="w-full flex justify-between px-6 py-5 hover:bg-slate-800">
      <span class="text-yellow-300 font-bold text-lg">第6章：興味づけ・ファン化</span>
      <span>▼</span>
    </button>

    <div id="ch6" class="hidden px-6 pb-6 grid md:grid-cols-3 gap-4">

      <div class="bg-slate-950 border border-yellow-400 rounded-xl p-4">
        <h3 class="text-yellow-300 font-bold mb-2">興味づけ</h3>
        <p class="text-sm text-slate-300">理想・常識破壊・ギャップ</p>
      </div>

      <div class="bg-slate-950 border border-purple-400 rounded-xl p-4">
        <h3 class="text-purple-300 font-bold mb-2">ファン化</h3>
        <p class="text-sm text-slate-300">行動・失敗・リアル</p>
      </div>

      <div class="bg-slate-950 border border-blue-400 rounded-xl p-4">
        <h3 class="text-blue-300 font-bold mb-2">価値提供</h3>
        <p class="text-sm text-slate-300">ノウハウ・構造化</p>
      </div>

    </div>
  </section>

  <!-- ===================== -->
  <!-- 第7章 -->
  <!-- ===================== -->
  <section class="bg-slate-900 rounded-2xl border border-indigo-400 overflow-hidden">

    <button onclick="toggleSection('ch7')" class="w-full flex justify-between px-6 py-5 hover:bg-slate-800">
      <span class="text-indigo-300 font-bold text-lg">第7章：長文ストーリーツイート</span>
      <span>▼</span>
    </button>

    <div id="ch7" class="hidden px-6 pb-6 space-y-4">

      <div class="bg-slate-950 border border-indigo-400 rounded-xl p-4">
        <h3 class="text-indigo-300 font-bold mb-2">本質</h3>
        <p class="text-slate-300">ストーリーで滞在時間を伸ばす</p>
      </div>

      <div class="grid md:grid-cols-2 gap-4">

        <div class="bg-slate-950 border border-indigo-400 rounded-xl p-4">
          <h3 class="text-indigo-300 font-bold mb-2">構造</h3>
          <p class="text-sm text-slate-300">出来事 → 感情 → 論理 → 教訓</p>
        </div>

        <div class="bg-slate-950 border border-indigo-400 rounded-xl p-4">
          <h3 class="text-indigo-300 font-bold mb-2">キャッチ</h3>
          <p class="text-sm text-slate-300">数字・損失・常識破壊</p>
        </div>

      </div>

    </div>
  </section>

</main>

</body>
</html>
